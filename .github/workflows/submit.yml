name: "Release"
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g. v1.1.0). If empty, uses version from package.json'
        required: false
        default: ''
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Extension
        run: |
          bun run build && bun run package
          bun run build:firefox && bun run package:firefox

      - name: Determine Tag Name
        id: tag
        shell: bash
        run: |
          TAG_NAME="${{ github.event.inputs.tag_name }}"
          if [ -n "$TAG_NAME" ]; then
            echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(bun -e "console.log(require('./package.json').version)")
            echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            build/chrome-mv3-prod.zip
            build/firefox-mv2-prod.zip
          generate_release_notes: true

      - name: Publish to Firefox Add-ons
        if: ${{ secrets.SUBMIT_KEYS != '' }}
        uses: PlasmoHQ/bpp@v3
        with:
          keys: ${{ secrets.SUBMIT_KEYS }}
          firefox-file: build/firefox-mv2-prod.zip
